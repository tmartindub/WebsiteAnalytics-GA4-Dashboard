<h1>Settings and Google Sign-in</h1>
<figure><img src="../assets/settings-redacted-clean.png" alt="Settings and Google Sign-in"><figcaption>OAuth examples are redacted and safe for public documentation.</figcaption></figure>

<ul><li>The client secret is hidden by default in the UI.</li><li>The refresh token is encrypted locally.</li><li>The app silently reconnects on startup when the saved token is valid.</li><li>Google login appears only when the token is missing, revoked, or cannot be refreshed.</li></ul>
